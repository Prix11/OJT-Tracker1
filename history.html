<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance history — OJT Hours Tracker</title>
  <script src="theme.js"></script>
  <script>OJTTheme.init();</script>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="toast.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
      --bg: #0f1419;
      --surface: #1a222c;
      --surface-hover: #232d3a;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9aaf;
      --accent: #3db88a;
      --accent-dim: #2a8f6a;
      --danger: #e85d5d;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      --on-accent: #0a0f12;
      --btn-primary-hover: #4bc896;
      --focus-ring: rgba(61, 184, 138, 0.2);
      --grid-line: rgba(61, 184, 138, 0.03);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Instrument Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
    }

    .panel {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.35s var(--ease-soft), border-color 0.25s var(--ease-soft),
        transform 0.35s var(--ease-out);
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0;
    }

    .back:hover {
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0.35rem 0 1.25rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .user-pill {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0 -0.25rem;
      padding: 0 0.25rem;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th,
    td {
      text-align: left;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    th {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    tbody tr {
      transition: background 0.22s var(--ease-soft);
    }

    tbody tr:hover {
      background: rgba(61, 184, 138, 0.06);
    }

    td.num {
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    th.num {
      text-align: right;
    }

    .total-cell {
      font-weight: 600;
      color: var(--accent);
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9375rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
      margin-top: 0.5rem;
    }

    .empty a {
      color: var(--accent);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .count-badge {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn-ghost:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    td.actions {
      white-space: nowrap;
    }

    .btn-row {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.35rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text);
      margin-right: 0.35rem;
    }

    .btn-row:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-row.danger {
      color: var(--danger);
      border-color: rgba(232, 93, 93, 0.45);
    }

    .btn-row.danger:hover {
      background: rgba(232, 93, 93, 0.12);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.32s var(--ease-out), visibility 0.32s, background 0.32s ease;
    }

    .modal-overlay:not([hidden]) {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.55);
    }

    .modal-overlay[hidden] {
      display: flex !important;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.26s var(--ease-soft), visibility 0.26s, background 0.26s ease;
    }

    .modal {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(18px) scale(0.97);
      opacity: 0;
      transition: transform 0.38s var(--ease-out), opacity 0.32s var(--ease-out);
    }

    .modal-overlay:not([hidden]) .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-overlay[hidden] .modal {
      transform: translateY(14px) scale(0.97);
      opacity: 0;
      transition: transform 0.28s var(--ease-soft), opacity 0.24s var(--ease-soft);
    }

    .modal h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 0.85rem;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 0.9375rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      align-items: center;
    }

    .modal-actions .btn-primary {
      background: var(--accent);
      color: var(--on-accent);
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-actions .btn-primary:hover {
      background: var(--btn-primary-hover);
    }

    .modal-actions .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-actions .btn-secondary:hover {
      color: var(--text);
    }

    .modal-error {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .modal-lead {
      margin: 0 0 1rem;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal-actions .btn-danger {
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-actions .btn-danger:hover {
      filter: brightness(1.08);
    }

    .modal-actions .btn-danger:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (prefers-reduced-motion: reduce) {
      .modal-overlay,
      .modal,
      .panel,
      tbody tr {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="wrap">
      <div class="panel">
        <div class="top-nav">
          <a class="back" href="index.html">← Dashboard</a>
          <div class="top-nav-right">
            <button type="button" class="theme-toggle-inline" data-theme-toggle aria-label="Switch theme"></button>
            <span class="user-pill" id="user-pill" title=""></span>
          </div>
        </div>
        <h1>Attendance history</h1>
        <p class="sub">
          All logged shifts for your account. <span class="count-badge" id="entry-count"></span>
        </p>
        <p id="load-error" class="error-msg" role="alert" hidden></p>
        <div id="empty-state" class="empty" hidden>
          No entries yet. <a href="time.html">Log time in / out</a> to add your first record.
        </div>
        <div id="table-container" class="table-wrap" hidden>
          <table>
            <thead>
              <tr>
                <th scope="col">Date</th>
                <th scope="col">Time in</th>
                <th scope="col">Time out</th>
                <th scope="col" class="num">Break (min)</th>
                <th scope="col" class="num">OT</th>
                <th scope="col" class="num">Net</th>
                <th scope="col" class="num">Total</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal">
      <h2 id="edit-modal-title">Edit entry</h2>
      <form id="form-edit" novalidate>
        <div class="field">
          <label for="edit-date">Date</label>
          <input id="edit-date" name="date" type="date" required />
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="edit-time-in">Time in</label>
            <input id="edit-time-in" name="timeIn" type="time" required />
          </div>
          <div class="field">
            <label for="edit-time-out">Time out</label>
            <input id="edit-time-out" name="timeOut" type="time" required />
          </div>
        </div>
        <div class="field">
          <label for="edit-break">Break (minutes)</label>
          <input id="edit-break" name="breakMinutes" type="number" min="0" step="1" value="0" />
        </div>
        <p style="margin:0 0 0.5rem;font-size:0.8125rem;color:var(--muted);">Overtime (optional)</p>
        <div class="grid-2">
          <div class="field">
            <label for="edit-ot-in">Overtime start</label>
            <input id="edit-ot-in" name="overtimeStart" type="time" />
          </div>
          <div class="field">
            <label for="edit-ot-out">Overtime end</label>
            <input id="edit-ot-out" name="overtimeEnd" type="time" />
          </div>
        </div>
        <p id="edit-error" class="modal-error" role="alert"></p>
        <div class="modal-actions">
          <button type="submit" class="btn-primary" id="btn-save-edit">Save changes</button>
          <button type="button" class="btn-secondary" id="btn-cancel-edit">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div
    id="delete-confirm-modal"
    class="modal-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-confirm-title"
  >
    <div class="modal">
      <h2 id="delete-confirm-title">Delete this record?</h2>
      <p id="delete-confirm-lead" class="modal-lead"></p>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="btn-delete-confirm">Delete</button>
        <button type="button" class="btn-secondary" id="btn-delete-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="db.js"></script>
  <script src="cloud.js"></script>
  <script src="data-api.js"></script>
  <script src="toast.js"></script>
  <script>
    (function () {
      function $(id) {
        return document.getElementById(id);
      }

      var currentUser = null;
      var editingEntryId = null;
      var editingEntrySnapshot = null;
      var cachedEntriesList = null;
      var deleteConfirmEntry = null;

      function cloneEntryForEdit(e) {
        return {
          id: e.id,
          date: e.date,
          timeIn: e.timeIn,
          timeOut: e.timeOut,
          breakMinutes: e.breakMinutes,
          overtimeStart: e.overtimeStart,
          overtimeEnd: e.overtimeEnd,
          overtimeHours: e.overtimeHours,
          grossHours: e.grossHours,
          netHours: e.netHours,
          totalHours: e.totalHours,
          createdAt: e.createdAt,
          userEmail: e.userEmail
        };
      }

      function replaceEntryInList(entries, entry) {
        var out = [];
        var id = String(entry.id);
        var replaced = false;
        for (var i = 0; i < entries.length; i++) {
          if (String(entries[i].id) === id) {
            out.push(entry);
            replaced = true;
          } else {
            out.push(entries[i]);
          }
        }
        if (!replaced) out.push(entry);
        return out;
      }

      function formatTime(t) {
        if (!t) return "—";
        return t.length >= 5 ? t.slice(0, 5) : t;
      }

      function formatDate(iso) {
        if (!iso) return "—";
        var parts = iso.split("-");
        if (parts.length !== 3) return iso;
        var y = parts[0];
        var m = parts[1];
        var d = parts[2];
        var monthNames = [
          "Jan", "Feb", "Mar", "Apr", "May", "Jun",
          "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
        ];
        var mi = parseInt(m, 10) - 1;
        if (mi >= 0 && mi < 12) {
          return monthNames[mi] + " " + parseInt(d, 10) + ", " + y;
        }
        return iso;
      }

      function formatHoursMinutes(h) {
        if (h == null || isNaN(h)) return "—";
        var neg = h < 0;
        h = Math.abs(Number(h));
        var totalMins = Math.round(h * 60);
        var hrs = Math.floor(totalMins / 60);
        var mins = totalMins % 60;
        return (neg ? "-" : "") + hrs + "h " + mins + "m";
      }

      function sortEntries(entries) {
        return entries.slice().sort(function (a, b) {
          var da = (a.date || "") + "T" + (a.timeIn || "00:00");
          var db = (b.date || "") + "T" + (b.timeIn || "00:00");
          if (db !== da) return db < da ? -1 : 1;
          return (b.createdAt || 0) - (a.createdAt || 0);
        });
      }

      function parseGrossHours(dateStr, tIn, tOut) {
        var start = new Date(dateStr + "T" + tIn + ":00");
        var end = new Date(dateStr + "T" + tOut + ":00");
        if (isNaN(start.getTime()) || isNaN(end.getTime())) return NaN;
        if (end <= start) {
          end.setDate(end.getDate() + 1);
        }
        return (end - start) / 3600000;
      }

      function readEditBreak() {
        var br = parseFloat($("edit-break").value, 10);
        if (isNaN(br) || br < 0) br = 0;
        return br;
      }

      function readEditOvertimeTimes() {
        var oIn = ($("edit-ot-in").value || "").trim();
        var oOut = ($("edit-ot-out").value || "").trim();
        return { overtimeStart: oIn, overtimeEnd: oOut };
      }

      function computeOvertimeHours(dateStr, otStart, otEnd) {
        if (!otStart || !otEnd) return 0;
        var h = parseGrossHours(dateStr, otStart, otEnd);
        return isNaN(h) || h <= 0 ? 0 : h;
      }

      function getOvertimeHoursForDisplay(entry) {
        if (entry.overtimeStart && entry.overtimeEnd) {
          var h = parseGrossHours(
            entry.date,
            String(entry.overtimeStart).slice(0, 5),
            String(entry.overtimeEnd).slice(0, 5)
          );
          if (!isNaN(h) && h > 0) return h;
        }
        return entry.overtimeHours != null ? entry.overtimeHours : 0;
      }

      function buildEntryFromEditForm(existingEntry) {
        var dateStr = $("edit-date").value;
        var tIn = $("edit-time-in").value;
        var tOut = $("edit-time-out").value;
        var br = readEditBreak();
        var ot = readEditOvertimeTimes();
        if (!dateStr || !tIn || !tOut) {
          return { error: "Please fill in date, time in, and time out." };
        }
        if ((ot.overtimeStart && !ot.overtimeEnd) || (!ot.overtimeStart && ot.overtimeEnd)) {
          return { error: "Enter both overtime start and end, or leave both empty." };
        }
        var gross = parseGrossHours(dateStr, tIn, tOut);
        if (isNaN(gross) || gross <= 0) {
          return {
            error: "Time out must be after time in (same day, or past midnight for night shifts)."
          };
        }
        var breakH = br / 60;
        if (breakH > gross + 1e-6) {
          return { error: "Break cannot be longer than the gross shift." };
        }
        var otH = 0;
        var otStartOut = "";
        var otEndOut = "";
        if (ot.overtimeStart && ot.overtimeEnd) {
          otH = computeOvertimeHours(dateStr, ot.overtimeStart, ot.overtimeEnd);
          if (otH <= 0) {
            return {
              error:
                "Overtime end must be after overtime start (same day, or past midnight for night overtime)."
            };
          }
          otStartOut = ot.overtimeStart;
          otEndOut = ot.overtimeEnd;
        } else {
          if (existingEntry.overtimeStart || existingEntry.overtimeEnd) {
            otH = 0;
          } else {
            otH = existingEntry.overtimeHours != null ? existingEntry.overtimeHours : 0;
          }
        }
        var net = Math.max(0, gross - breakH);
        var total = net + otH;
        return {
          entry: {
            id: existingEntry.id,
            date: dateStr,
            timeIn: tIn,
            timeOut: tOut,
            breakMinutes: br,
            overtimeStart: otStartOut,
            overtimeEnd: otEndOut,
            overtimeHours: Math.round(otH * 1000) / 1000,
            grossHours: Math.round(gross * 1000) / 1000,
            netHours: Math.round(net * 1000) / 1000,
            totalHours: Math.round(total * 1000) / 1000,
            createdAt: existingEntry.createdAt != null ? existingEntry.createdAt : Date.now(),
            updatedAt: Date.now(),
            userEmail: existingEntry.userEmail
          }
        };
      }

      function setEditSaveBusy(busy) {
        var b = !!busy;
        var saveBtn = $("btn-save-edit");
        var cancelBtn = $("btn-cancel-edit");
        var form = $("form-edit");
        if (saveBtn) {
          saveBtn.disabled = b;
          saveBtn.textContent = b ? "Saving…" : "Save changes";
        }
        if (cancelBtn) cancelBtn.disabled = b;
        if (form) form.setAttribute("aria-busy", b ? "true" : "false");
        [
          "edit-date",
          "edit-time-in",
          "edit-time-out",
          "edit-break",
          "edit-ot-in",
          "edit-ot-out"
        ].forEach(function (id) {
          var el = $(id);
          if (el) el.disabled = b;
        });
      }

      function openEditModal(entry) {
        editingEntryId = entry.id;
        editingEntrySnapshot = cloneEntryForEdit(entry);
        setEditSaveBusy(false);
        $("edit-date").value = entry.date || "";
        $("edit-time-in").value = entry.timeIn ? entry.timeIn.slice(0, 5) : "";
        $("edit-time-out").value = entry.timeOut ? entry.timeOut.slice(0, 5) : "";
        $("edit-break").value = String(entry.breakMinutes != null ? entry.breakMinutes : 0);
        if (entry.overtimeStart && entry.overtimeEnd) {
          $("edit-ot-in").value = String(entry.overtimeStart).slice(0, 5);
          $("edit-ot-out").value = String(entry.overtimeEnd).slice(0, 5);
        } else {
          $("edit-ot-in").value = "";
          $("edit-ot-out").value = "";
        }
        $("edit-error").textContent = "";
        $("edit-modal").hidden = false;
        $("edit-date").focus();
      }

      function closeEditModal(forceClose) {
        var saveBtn = $("btn-save-edit");
        if (forceClose !== true && saveBtn && saveBtn.disabled) return;
        editingEntryId = null;
        $("edit-modal").hidden = true;
        $("edit-error").textContent = "";
        setEditSaveBusy(false);
      }

      function openDeleteConfirmModal(entry) {
        deleteConfirmEntry = entry;
        var lead = $("delete-confirm-lead");
        if (lead) {
          lead.textContent =
            "Remove the attendance record for " +
            formatDate(entry.date) +
            " (" +
            formatTime(entry.timeIn) +
            " – " +
            formatTime(entry.timeOut) +
            ")? This cannot be undone.";
        }
        var cBtn = $("btn-delete-confirm");
        var xBtn = $("btn-delete-cancel");
        if (cBtn) cBtn.disabled = false;
        if (xBtn) xBtn.disabled = false;
        $("delete-confirm-modal").hidden = false;
        if (cBtn) cBtn.focus();
      }

      function closeDeleteConfirmModal() {
        deleteConfirmEntry = null;
        $("delete-confirm-modal").hidden = true;
      }

      function render(entries) {
        var tbody = $("tbody");
        var empty = $("empty-state");
        var table = $("table-container");
        var countEl = $("entry-count");
        tbody.innerHTML = "";

        if (!entries.length) {
          cachedEntriesList = [];
          empty.hidden = false;
          table.hidden = true;
          countEl.textContent = "";
          return;
        }

        empty.hidden = true;
        table.hidden = false;
        countEl.textContent = entries.length + " record" + (entries.length === 1 ? "" : "s");

        cachedEntriesList = entries.slice();

        var sorted = sortEntries(entries);
        for (var i = 0; i < sorted.length; i++) {
          var e = sorted[i];
          var tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" +
            escapeHtml(formatDate(e.date)) +
            "</td>" +
            "<td>" +
            escapeHtml(formatTime(e.timeIn)) +
            "</td>" +
            "<td>" +
            escapeHtml(formatTime(e.timeOut)) +
            "</td>" +
            '<td class="num">' +
            escapeHtml(String(e.breakMinutes != null ? e.breakMinutes : 0)) +
            "</td>" +
            '<td class="num">' +
            escapeHtml(formatHoursMinutes(getOvertimeHoursForDisplay(e))) +
            "</td>" +
            '<td class="num">' +
            escapeHtml(formatHoursMinutes(e.netHours)) +
            "</td>" +
            '<td class="num total-cell">' +
            escapeHtml(formatHoursMinutes(e.totalHours)) +
            "</td>" +
            '<td class="actions">' +
            '<button type="button" class="btn-row" data-action="edit">Edit</button>' +
            '<button type="button" class="btn-row danger" data-action="delete">Delete</button>' +
            "</td>";
          tbody.appendChild(tr);
          (function (entry) {
            var editBtn = tr.querySelector('[data-action="edit"]');
            var delBtn = tr.querySelector('[data-action="delete"]');
            editBtn.addEventListener("click", function () {
              openEditModal(entry);
            });
            delBtn.addEventListener("click", function () {
              openDeleteConfirmModal(entry);
            });
          })(e);
        }
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function logout() {
        OJTApp.logout().then(function () {
          window.location.href = "index.html";
        });
      }

      function findEntryById(entries, id) {
        for (var i = 0; i < entries.length; i++) {
          if (String(entries[i].id) === String(id)) return entries[i];
        }
        return null;
      }

      function init() {
        var dashBack = document.querySelector('a.back[href="index.html"]');
        if (dashBack) {
          dashBack.addEventListener("click", function () {
            try {
              sessionStorage.setItem("ojt_return_home", "1");
            } catch (e) {}
          });
        }

        $("btn-cancel-edit").addEventListener("click", closeEditModal);
        $("edit-modal").addEventListener("click", function (ev) {
          if (ev.target === $("edit-modal")) closeEditModal();
        });
        document.addEventListener("keydown", function (ev) {
          if (ev.key !== "Escape") return;
          if (!$("delete-confirm-modal").hidden) {
            closeDeleteConfirmModal();
            return;
          }
          if (!$("edit-modal").hidden) closeEditModal();
        });

        $("btn-delete-cancel").addEventListener("click", closeDeleteConfirmModal);
        $("delete-confirm-modal").addEventListener("click", function (ev) {
          if (ev.target === $("delete-confirm-modal")) closeDeleteConfirmModal();
        });

        $("btn-delete-confirm").addEventListener("click", function () {
          if (!deleteConfirmEntry || !currentUser) return;
          var entry = deleteConfirmEntry;
          var confirmBtn = $("btn-delete-confirm");
          var cancelBtn = $("btn-delete-cancel");
          if (confirmBtn) confirmBtn.disabled = true;
          if (cancelBtn) cancelBtn.disabled = true;
          OJTApp.init()
            .then(function () {
              return OJTApp.deleteEntry(entry.id, currentUser);
            })
            .then(function () {
              return OJTApp.getAllEntries(currentUser);
            })
            .then(function (list) {
              closeDeleteConfirmModal();
              if (typeof OJTToast !== "undefined" && OJTToast.deleted) {
                OJTToast.deleted("Entry deleted successfully.");
              } else if (typeof OJTToast !== "undefined" && OJTToast.show) {
                OJTToast.show({
                  type: "deleted",
                  title: "Deleted",
                  message: "Entry deleted successfully.",
                  duration: 4500
                });
              }
              render(list || []);
            })
            .catch(function (err) {
              alert((err && err.message) || "Could not delete.");
              closeDeleteConfirmModal();
            })
            .then(function () {
              if (confirmBtn) confirmBtn.disabled = false;
              if (cancelBtn) cancelBtn.disabled = false;
            });
        });

        $("form-edit").addEventListener("submit", function (e) {
          e.preventDefault();
          var errEl = $("edit-error");
          errEl.textContent = "";
          if (!currentUser || editingEntryId == null) {
            errEl.textContent = "Session error. Reload the page.";
            return;
          }
          var saveBtn = $("btn-save-edit");
          if (saveBtn && saveBtn.disabled) {
            return;
          }

          function finishEditSave() {
            setEditSaveBusy(false);
          }

          setEditSaveBusy(true);

          OJTApp.init()
            .then(function () {
              var existing = editingEntrySnapshot;
              if (
                !existing ||
                String(existing.id) !== String(editingEntryId)
              ) {
                errEl.textContent = "Entry not found. Close the dialog and try again.";
                finishEditSave();
                return Promise.resolve();
              }
              var built = buildEntryFromEditForm(existing);
              if (built.error) {
                errEl.textContent = built.error;
                finishEditSave();
                return Promise.resolve();
              }
              return OJTApp.updateEntry(built.entry, currentUser).then(function () {
                if (typeof OJTToast !== "undefined" && OJTToast.success) {
                  OJTToast.success("Entry saved successfully!");
                }
                closeEditModal(true);
                var base =
                  cachedEntriesList && cachedEntriesList.length
                    ? cachedEntriesList.slice()
                    : [];
                var merged = replaceEntryInList(base, built.entry);
                render(merged);
                return OJTApp.getAllEntries(currentUser);
              });
            })
            .then(function (list) {
              if (list === undefined) return;
              render(list || []);
            })
            .catch(function (err) {
              errEl.textContent = (err && err.message) || "Could not save changes.";
            })
            .then(finishEditSave);
        });

        OJTApp.init()
          .then(function () {
            return OJTApp.waitForAuth();
          })
          .then(function () {
            var user = OJTApp.getUser();
            if (!user || !user.email) {
              window.location.href = "index.html";
              return;
            }
            currentUser = user;
            $("user-pill").textContent = user.email;
            $("user-pill").title = user.email;
            return OJTApp.getAllEntries(user);
          })
          .then(function (entries) {
            if (entries === undefined) return;
            render(entries || []);
          })
          .catch(function (err) {
            $("load-error").hidden = false;
            $("load-error").textContent =
              "Could not load history. Check Firebase config or open this folder over http(s).";
            $("empty-state").hidden = true;
            $("table-container").hidden = true;
          });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
